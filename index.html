<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js Starter</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at top, #243b55 0%, #0f2027 45%, #05070a 100%);
        font-family: sans-serif;
      }

      canvas {
        display: block;
      }

      .overlay {
        position: fixed;
        top: 1rem;
        left: 1rem;
        padding: 0.75rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 14px;
        background: rgba(10, 14, 20, 0.55);
        color: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(10px);
      }

      .overlay h1,
      .overlay p {
        margin: 0;
      }

      .overlay h1 {
        font-size: 0.95rem;
        font-weight: 600;
      }

      .overlay p {
        margin-top: 0.35rem;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.7);
      }
    </style>
  </head>
  <body>
    <div class="overlay">
      <h1>Three.js + Bun</h1>
      <p>Edit or delete this starter scene.</p>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
